services:
  # 1. FastAPI Web Server
  - type: web
    name: interview-stack-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # DATABASE_URL from Render's Postgres is a plain postgres(ql):// URL; this
    # app uses psycopg3 via SQLAlchemy, which requires the postgresql+psycopg://
    # dialect prefix (see requirements.txt / app/core/config.py) - rewritten
    # in place before alembic/uvicorn start, since it's config-shape, not
    # app logic.
    startCommand: >-
      export DATABASE_URL=$(echo "$DATABASE_URL" | sed -E 's#^postgres(ql)?://#postgresql+psycopg://#') &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interview-stack-db
          property: connectionString
      # Celery reads CELERY_BROKER_URL / CELERY_RESULT_BACKEND specifically
      # (app/core/celery_app.py) - not REDIS_URL, which the app never reads.
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: interview-stack-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: interview-stack-redis
          property: connectionString
      # AI_PROVIDER defaults to "mock" - without this, OPENAI_API_KEY below
      # would be configured but never actually used.
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      # Defaults to ["http://localhost:3000"] otherwise, which blocks the
      # deployed frontend. Set in the Render dashboard as a JSON array, e.g.
      # ["https://your-frontend-domain.com"] (pydantic-settings parses this
      # field as JSON, matching backend/.env.example).
      - key: CORS_ORIGINS
        sync: false

  # 2. Celery Worker
  - type: worker
    name: interview-stack-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      export DATABASE_URL=$(echo "$DATABASE_URL" | sed -E 's#^postgres(ql)?://#postgresql+psycopg://#') &&
      celery -A app.core.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interview-stack-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: interview-stack-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: interview-stack-redis
          property: connectionString
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false

databases:
  # 3. PostgreSQL Database with pgvector
  - name: interview-stack-db
    databaseName: interview_stack
    user: postgres

  # 4. Redis Broker
  - type: redis
    name: interview-stack-redis
    ipAllowList: []
