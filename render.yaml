services:
  # 1. FastAPI Web Server
  - type: web
    name: interview-stack-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interview-stack-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: interview-stack-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  # 2. Celery Worker
  - type: worker
    name: interview-stack-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.core.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interview-stack-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: interview-stack-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

  # 3. Key Value (Redis-Compatible) Broker
  - type: keyvalue
    name: interview-stack-redis
    ipAllowList: [] # keeps access internal to Render's private network

databases:
  # 4. PostgreSQL Database
  - name: interview-stack-db
    databaseName: interview_stack
    user: postgres
